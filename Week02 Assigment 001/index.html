<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore Northern Pakistan</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    .hero{
        width:100%;
        height:100vh;
        background:
            linear-gradient(rgba(0,0,0,0.15), rgba(0,0,0,0.15)),
            url("mountains.jpg");
        background-size:cover;
        background-position:center;
        display:flex;
        align-items:center;
        padding-left:50px;
    }

    .content h1{
        color:#fff;
        font-size:70px;
        font-weight:700;
        line-height:1.1;
        margin-bottom:25px;
    }

    .btn{
        display:inline-block;
        background:#0d6efd;
        color:#fff;
        text-decoration:none;
        padding:12px 25px;
        border-radius:6px;
        font-size:18px;
        transition:0.3s;
    }

    .btn:hover{
        background:#0b5ed7;
    }

    @media(max-width:768px){
        .hero{
            padding-left:25px;
        }

        .content h1{
            font-size:45px;
        }
    }
</style>
</head>

<body>

<section class="hero">
    <div class="content">
        <h1>
            Explore<br>
            Northern Pakistan
        </h1>

        <a href="#" class="btn">
            Explore Now →
        </a>
    </div>
</section>

</body>
</html>
